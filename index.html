<!DOCTYPE html>
<html>
<head>

<title>E-Voting Verifier</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{box-sizing:border-box;font-family:Segoe UI}

body{
margin:0;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.container{
width:850px;
max-width:95%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

h1{text-align:center;margin-bottom:10px}

.subtitle{
text-align:center;
opacity:.7;
margin-bottom:20px;
}

.input-area{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

input{
padding:12px;
border:none;
border-radius:8px;
width:260px;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

button:hover{background:#16a34a}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:#020617;
padding:18px;
border-radius:12px;
}

.success{color:#4ade80;font-weight:bold}
.fail{color:#f87171;font-weight:bold}

.hash{
font-size:12px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="container">

<h1>E-Voting Verifier</h1>
<div class="subtitle">Secure Registration Verification</div>

<div class="input-area">

<input type="file" id="csvFile">

<input id="regNumber" placeholder="Enter Registration Number">

<button onclick="verify()">Verify</button>

</div>


<div class="grid">

<div class="card">
<h3>Verification Result</h3>
<div id="result">Upload CSV to begin</div>
</div>

<div class="card">
<h3>System Info</h3>
<div>Total Registrations: <span id="total">0</span></div>
<div>Merkle Root:</div>
<div class="hash" id="root">Waiting...</div>
</div>

<div class="card">
<h3>Hash</h3>
<div id="hash">Waiting...</div>
</div>

<div class="card">
<h3>Status</h3>
<div id="status">Idle</div>
</div>

</div>

</div>


<script>

let registrations={}


// simple fast hash (browser friendly)

function simpleHash(str){

let hash=0

for(let i=0;i<str.length;i++){

hash=(hash<<5)-hash+str.charCodeAt(i)
hash|=0

}

return Math.abs(hash).toString(16)

}



// CSV loader

document.getElementById("csvFile").addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(e){

let rows=e.target.result.split("\n")

for(let i=1;i<rows.length;i++){

let row=rows[i].trim()

if(!row) continue

let cols=row.split(",")

let reg=cols[0].trim()
let name=cols.slice(1).join(",").trim()

registrations[reg]=name

}

document.getElementById("total").innerText=Object.keys(registrations).length

// generate demo root (first 100 only to avoid freeze)

let keys=Object.keys(registrations).slice(0,100)

let combined=keys.join("")

document.getElementById("root").innerText=simpleHash(combined)

}

reader.readAsText(file)

})



// verify

function verify(){

let reg=document.getElementById("regNumber").value.trim()

let result=document.getElementById("result")

let status=document.getElementById("status")

let hashBox=document.getElementById("hash")

if(Object.keys(registrations).length===0){

result.innerHTML="<span class='fail'>Upload CSV first</span>"
return

}

let name=registrations[reg]

if(!name){

result.innerHTML="<span class='fail'>Registration Not Found</span>"
status.innerText="Invalid"
hashBox.innerText="---"

return

}

let hash=simpleHash(reg)

result.innerHTML="<span class='success'>Verified</span><br>Name: "+name

hashBox.innerText=hash

status.innerText="Valid Registration"

}

</script>

</body>
</html>
